<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - Sign In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #05070a;">
    <header class="navbar navbar-showcase">
        <div class="container">
            <div class="navbar-brand">
                <a href="index.html"><span class="brand-mark" aria-hidden="true"></span>StreamFlix</a>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-hero">
            <!-- Global Movie Poster Infinite Scroll Background -->
            <div class="movie-poster-scroll">
                <div class="poster-track dyn-track">
                    <!-- Posters injected by JS -->
                </div>
                <div class="poster-track reverse dyn-track">
                    <!-- Posters injected by JS -->
                </div>
                <div class="bg-overlay"></div>
            </div>

            <div class="container container-auth">
                <div class="auth-brand">
                    <h1 class="brand-name" style="font-size: 2.5rem;">StreamFlix</h1>
                </div>

                <!-- Unified Auth Cards with Glassmorphism -->
                <div class="auth-card form-container glass-panel active" id="login-section">
                    <h2>Sign In</h2>
                    <p class="helper">Welcome back. Enter your credentials.</p>
                    <div class="alert" id="login-error" style="display:none;"></div>
                    <form action="api/login.php" method="POST">
                        <div class="field">
                            <label class="label">Email</label>
                            <input type="email" name="email" placeholder="you@example.com" required>
                        </div>
                        <div class="field">
                            <label class="label">Password</label>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                        <div class="field-alt">
                            <a href="recover.html" class="link-muted">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Login</button>
                    </form>
                    <p class="small">New to StreamFlix? <a href="register.html">Create an account</a>.</p>
                </div>

    <script>
        window.addEventListener('load', () => {
             const urlParams = new URLSearchParams(window.location.search);
             if (urlParams.get('email_err') || urlParams.get('password_err')) {
                 const el = document.getElementById('login-error');
                 el.textContent = [urlParams.get('email_err'), urlParams.get('password_err')].filter(Boolean).join(' ');
                 el.style.display = 'block';
             }
        });
    </script>
    <script src="js/script.js"></script>
</body>
</html>
